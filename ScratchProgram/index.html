<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幻想航空鉄道運転シュミレーター</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      color: #e0e0e0;
      padding: 1rem;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      text-align: center;
      text-shadow: 0 0 12px rgba(100,180,255,0.6);
      letter-spacing: 0.05em;
    }

    #stage-wrapper {
      position: relative;
      width: 480px;
      height: 360px;
      background: #000;
      border: 2px solid #444;
      border-radius: 4px;
      overflow: hidden;
    }

    #scratch-canvas {
      display: block;
      width: 480px;
      height: 360px;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      gap: 1rem;
      transition: opacity 0.3s;
    }

    #overlay.hidden { opacity: 0; pointer-events: none; }

    #status-text { font-size: 1.1rem; text-align: center; padding: 0 1rem; }

    #progress-bar-container {
      width: 300px;
      height: 10px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4c9be8, #74d7f7);
      width: 0%;
      transition: width 0.2s;
      border-radius: 5px;
    }

    #controls {
      margin-top: 0.75rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: filter 0.15s, transform 0.1s;
    }
    .ctrl-btn:active { transform: scale(0.96); }
    .ctrl-btn:disabled { opacity: 0.4; cursor: default; }

    #btn-flag { background: #3cb371; color: #fff; }
    #btn-flag:hover:not(:disabled) { filter: brightness(1.15); }

    #btn-stop { background: #e05050; color: #fff; }
    #btn-stop:hover:not(:disabled) { filter: brightness(1.15); }

    #fullscreen-hint {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #888;
    }

    @media (max-width: 520px) {
      #stage-wrapper { width: 100%; height: auto; aspect-ratio: 4/3; }
      #scratch-canvas { width: 100%; height: auto; }
    }
  </style>
</head>
<body>

  <h1>幻想航空鉄道運転シュミレーター</h1>

  <div id="stage-wrapper">
    <canvas id="scratch-canvas" width="480" height="360"></canvas>
    <div id="overlay">
      <div id="status-text">スクリプトを読み込んでいます…</div>
      <div id="progress-bar-container"><div id="progress-bar"></div></div>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-flag" disabled>▶ 開始（緑の旗）</button>
    <button class="ctrl-btn" id="btn-stop"  disabled>■ 停止</button>
  </div>
  <div id="fullscreen-hint">ダブルクリックまたは F キーでフルスクリーン</div>

  <!--
    Scratch ランタイム（jsDelivr CDN）
    scratch-vm     → window.VirtualMachine
    scratch-render → window.ScratchRender
    scratch-storage → window.ScratchStorage
  -->
  <script src="https://cdn.jsdelivr.net/npm/scratch-vm@5.0.300/dist/web/scratch-vm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/scratch-render@2.2.84/dist/web/scratch-render.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/scratch-storage@6.2.1/dist/web/scratch-storage.js"></script>
  <!--
    scratch-audio は CommonJS ビルド (module.exports = ...) のため、
    ブラウザ環境ではダミーの module オブジェクトを事前に用意する。
    読み込み完了後に window.AudioEngine へ代入して元の状態を復元する。
  -->
  <script>window.__scratchAudioMod = { exports: {} }; window.module = window.__scratchAudioMod;</script>
  <script src="https://cdn.jsdelivr.net/npm/scratch-audio@2.0.268/dist.js"
          onload="window.AudioEngine = window.__scratchAudioMod.exports; delete window.__scratchAudioMod; delete window.module;"
          onerror="delete window.__scratchAudioMod; delete window.module; console.warn('scratch-audio の読み込みに失敗（音声なし）');"></script>

  <script>
  (async () => {
    /* ── 要素 ── */
    const canvas      = document.getElementById('scratch-canvas');
    const overlay     = document.getElementById('overlay');
    const statusText  = document.getElementById('status-text');
    const progressBar = document.getElementById('progress-bar');
    const btnFlag     = document.getElementById('btn-flag');
    const btnStop     = document.getElementById('btn-stop');
    const wrapper     = document.getElementById('stage-wrapper');

    const setStatus  = msg => { statusText.textContent = msg; };
    const hideOverlay = () => { overlay.classList.add('hidden'); };

    /* ── VM 初期化 ── */
    setStatus('仮想マシンを初期化中…');

    let vm, renderer;
    try {
      vm = new window.VirtualMachine();

      /* レンダラー */
      renderer = new window.ScratchRender(canvas);
      vm.attachRenderer(renderer);
    } catch (err) {
      setStatus('⚠ 仮想マシンの初期化に失敗しました: ' + err.message);
      console.error(err);
      return;
    }

    /* ビットマップアダプター（JPEG/PNG コスチュームの読み込みに必要） */
    vm.attachV2BitmapAdapter({
      resize(image, w, h) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        if (!ctx) throw new Error('Failed to get 2D context for bitmap resize');
        ctx.drawImage(image, 0, 0, w, h);
        return c;
      },
      convertDataURIToBinary(uri) {
        const marker = ';base64,';
        const markerIdx = uri.indexOf(marker);
        if (markerIdx === -1) throw new Error('Invalid data URI: missing base64 marker');
        const b64 = uri.slice(markerIdx + marker.length);
        const raw = atob(b64);
        const arr = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
        return arr;
      }
    });

    /* オーディオ */
    try {
      const AE = window.AudioEngine;
      if (typeof AE === 'function') {
        vm.attachAudioEngine(new AE());
      }
    } catch (e) {
      console.warn('オーディオエンジンの初期化に失敗:', e);
    }

    /* ストレージ（.sb3 内のアセットは zip に内包されているため必須ではないが付ける） */
    try {
      if (window.ScratchStorage) {
        // scratch-storage@6.x は { ScratchStorage, AssetType, ... } というモジュールオブジェクトを
        // エクスポートするため、クラス本体を取り出す
        const StorageClass = typeof window.ScratchStorage === 'function'
          ? window.ScratchStorage
          : window.ScratchStorage.ScratchStorage;
        const storage = new StorageClass();
        const { AssetType } = storage;
        storage.addWebStore(
          [AssetType.ImageVector, AssetType.ImageBitmap, AssetType.Sound],
          asset =>
            `https://cdn.assets.scratch.mit.edu/internalapi/asset/${asset.assetId}.${asset.dataFormat}/get/`
        );
        vm.attachStorage(storage);
      }
    } catch (e) {
      console.warn('ストレージの初期化に失敗:', e);
    }

    /* ── プロジェクトファイル取得 ── */
    setStatus('プロジェクトファイルをダウンロード中…');

    let projectData;
    try {
      const resp = await fetch('./幻想航空鉄道運転シュミレーター.sb3');
      if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);

      const total = parseInt(resp.headers.get('Content-Length') || '0', 10);
      const reader = resp.body.getReader();
      const chunks = [];
      let received = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        if (total > 0) {
          progressBar.style.width = Math.round((received / total) * 100) + '%';
        }
      }

      progressBar.style.width = '100%';

      // Uint8Array チャンクを単一の ArrayBuffer に結合
      const merged = new Uint8Array(received);
      let offset = 0;
      for (const chunk of chunks) {
        merged.set(chunk, offset);
        offset += chunk.length;
      }
      projectData = merged.buffer;
    } catch (err) {
      setStatus('⚠ ファイルの読み込みに失敗しました: ' + err.message);
      console.error(err);
      return;
    }

    /* ── プロジェクトロード ── */
    setStatus('プロジェクトを解析中…');
    try {
      await vm.loadProject(projectData);
    } catch (err) {
      setStatus('⚠ プロジェクトの読み込みに失敗しました: ' + err.message);
      console.error(err);
      return;
    }

    /* ── 起動 ── */
    vm.start();
    vm.greenFlag();
    hideOverlay();

    btnFlag.disabled = false;
    btnStop.disabled = false;

    btnFlag.addEventListener('click', () => vm.greenFlag());
    btnStop.addEventListener('click', () => vm.stopAll());

    /* ── フルスクリーン ── */
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        wrapper.requestFullscreen().catch(e => console.warn(e));
      } else {
        document.exitFullscreen();
      }
    }
    wrapper.addEventListener('dblclick', toggleFullscreen);
    document.addEventListener('keydown', e => {
      if ((e.key === 'f' || e.key === 'F') && !e.ctrlKey && !e.metaKey) toggleFullscreen();
    });

    /* ── キーボード入力（Scratch VM へ転送） ── */
    document.addEventListener('keydown', e => {
      vm.postIOData('keyboard', { key: e.key, keyCode: e.keyCode, isDown: true });
    });
    document.addEventListener('keyup', e => {
      vm.postIOData('keyboard', { key: e.key, keyCode: e.keyCode, isDown: false });
    });

    /* ── マウス / タッチ入力 ── */
    function stageCoords(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (clientX - rect.left) * (480 / rect.width) - 240,
        y: 180 - (clientY - rect.top) * (360 / rect.height),
      };
    }

    canvas.style.touchAction = 'none';

    canvas.addEventListener('mousemove', e => {
      const { x, y } = stageCoords(e.clientX, e.clientY);
      vm.postIOData('mouse', { x, y });
    });
    canvas.addEventListener('mousedown', e => {
      const { x, y } = stageCoords(e.clientX, e.clientY);
      vm.postIOData('mouse', { x, y, isDown: true, button: e.button });
    });
    canvas.addEventListener('mouseup', e => {
      const { x, y } = stageCoords(e.clientX, e.clientY);
      vm.postIOData('mouse', { x, y, isDown: false, button: e.button });
    });
    canvas.addEventListener('mouseleave', () => {
      vm.postIOData('mouse', { isDown: false, button: 0 });
    });

    canvas.addEventListener('touchstart', e => {
      const t = e.touches[0];
      if (!t) return;
      const { x, y } = stageCoords(t.clientX, t.clientY);
      vm.postIOData('mouse', { x, y, isDown: true, button: 0 });
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      const t = e.touches[0];
      if (!t) return;
      const { x, y } = stageCoords(t.clientX, t.clientY);
      vm.postIOData('mouse', { x, y, isDown: true, button: 0 });
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      const t = e.changedTouches[0];
      if (t) {
        const { x, y } = stageCoords(t.clientX, t.clientY);
        vm.postIOData('mouse', { x, y, isDown: false, button: 0 });
      } else {
        vm.postIOData('mouse', { isDown: false, button: 0 });
      }
      e.preventDefault();
    }, { passive: false });

  })().catch(err => {
    document.getElementById('status-text').textContent = '⚠ 予期しないエラーが発生しました: ' + err.message;
    console.error(err);
  });
  </script>
</body>
</html>
